services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: persona_ai_qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"   # REST API  → http://localhost:6333
      - "6334:6334"   # gRPC API  → localhost:6334
    volumes:
      - qdrant_storage:/qdrant/storage   # persist collections + vectors
    environment:
      # Optional: enable API-key auth (recommended for prod)
      # QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY}
      QDRANT__LOG_LEVEL: INFO
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/readyz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  qdrant_storage:
    driver: local
